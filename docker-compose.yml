services:
  ccc:
    build: .
    container_name: claude-command-center
    ports:
      - "4000:4000"
    volumes:
      # Mount your layered cake (read-only) so the dashboard can read it
      - ~/.claude:/home/nextjs/.claude:ro
      # Writable volume for SQLite task database
      - ccc-data:/app/data
    environment:
      - HOME=/home/nextjs
      - DATA_DIR=/app/data
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - CCC_FORCE_MODEL=${CCC_FORCE_MODEL:-}
    restart: unless-stopped

volumes:
  ccc-data:
